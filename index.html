<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Developer Nagmani-Yadav</title>

<style>
body{
    margin:0;
    font-family:Poppins;
    background:url('https://images.unsplash.com/photo-1518770660439-4636190af475') no-repeat center/cover;
    display:flex;
}

/* Sidebar */
.sidebar{
    width:200px;
    background:rgba(0,0,0,0.8);
    padding:20px;
}
.sidebar button{
    width:100%;
    margin:10px 0;
    padding:10px;
    background:black;
    border:1px solid cyan;
    color:cyan;
    cursor:pointer;
}

/* Glow */
.glow{
    color:cyan;
    text-shadow:0 0 10px cyan;
}

/* Main */
.main{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
}

.box{
    width:90%;
    max-width:900px;
    height:90vh;
    background:rgba(0,0,0,0.7);
    border-radius:20px;
    padding:20px;
    overflow:auto;
    text-align:center;
    box-shadow:0 0 50px cyan;
}

/* Profile */
.profile{
    position:relative;
    width:160px;
    height:160px;
    margin:auto;
}

/* Center photo */
.profile img.main{
    width:130px;
    height:130px;
    border-radius:50%;
    border:3px solid cyan;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
}

/* Orbit */
.orbit{
    position:absolute;
    top:50%;
    left:50%;
    width:220px;
    height:220px;
    transform:translate(-50%,-50%);
}

/* Orbit icons */
.orbit img{
    position:absolute;
    width:40px;
    top:50%;
    left:50%;
    transform-origin:-110px center;
    animation:spin 6s linear infinite;
}

/* Equal spacing */
.orbit img:nth-child(1){animation-delay:0s;}
.orbit img:nth-child(2){animation-delay:-1.5s;}
.orbit img:nth-child(3){animation-delay:-3s;}
.orbit img:nth-child(4){animation-delay:-4.5s;}

@keyframes spin{
    from{
        transform:rotate(0deg) translateX(110px) rotate(0deg);
    }
    to{
        transform:rotate(360deg) translateX(110px) rotate(-360deg);
    }
}

/* Image */
.page-img{
    width:100%;
    max-width:400px;
    margin-top:15px;
    border-radius:10px;
}

/* Buttons */
.btn{
    display:inline-block;
    margin:10px;
    padding:10px;
    border:1px solid cyan;
    color:cyan;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="sidebar">
<button onclick="show('about')">About</button>
<button onclick="show('skills')">Skills</button>
<button onclick="show('contact')">Contact</button>

<button onclick="show('dec')">Declaration</button>
</div>

<div class="main">
<div class="box">

<div class="orbit">
<img src="https://cdn-icons-png.flaticon.com/512/5968/5968267.png">
<img src="https://cdn-icons-png.flaticon.com/512/5968/5968292.png">
<img src="https://cdn-icons-png.flaticon.com/512/5968/5968350.png">
<img src="https://cdn-icons-png.flaticon.com/512/732/732190.png">
</div>
</div>

<h1 class="glow">Developer Nagmani-Yadav</h1>

<div id="content"></div>

</div>
</div>

</body>
</html>
